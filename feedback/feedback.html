    <div class="contactform">
        <div class="contact-container">
            <form name="Kontakt" id="form" method="POST" netlify-honeypot="bot-field" data-netlify="true" netlify action="/feedback/success.html">
                <p class="hidden">
                    <label>
                        Don’t fill this out if you’re human: <input name="bot-field"/>
                    </label>
                </p>
                <h2 class="title">Kontaktiere Mich!</h2>
                    <hr>
                <div class="input-group">
                    <input class="input" name="name" placeholder="Name" type="text" data-validetta="required,minLength[4]">
                </div>
                <div class="input-group">
                    <input class="input" name="lastName" placeholder="Nachname (optional)" type="text,minLength[6]">
                </div>
                <div class="input-group">
                    <input class="input" name="email" placeholder="E-Mail" type="text" data-validetta="required,email">
                </div>
                <div class="input-group">
                    <input class="input" name="betreff" placeholder="Betreff" type="text" data-validetta="required,minLength[5]">
                </div>
                <div class="lasttwo">
                    <textarea name="Nachricht" placeholder="Deine Nachricht" autocomplete="off"  class="contact-inputs textfeld" type="text" data-validetta="required,minLength[20],maxLength[500]"></textarea>
                    <button type="submit" class="submitButton" onclick="continueornot()">Senden</button>
                </div>
            </form>
